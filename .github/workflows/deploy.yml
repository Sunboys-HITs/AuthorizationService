name: Deploy Authorization Service

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/sunboys-hits/authorization-service
  DEPLOYMENT_NAME: auth-service
  NAMESPACE: app

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE=${IMAGE_NAME}:${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./AuthorizationService
          file: ./AuthorizationService/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Ensure namespace exists
        run: kubectl create namespace "$NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -

      - name: Configure database connection
        env:
          AUTH_DB_PASSWORD: ${{ secrets.AUTH_DB_PASSWORD }}
        run: |
          test -n "$AUTH_DB_PASSWORD" || {
            echo 'AUTH_DB_PASSWORD GitHub Actions secret is not configured' >&2
            exit 1
          }
          kubectl -n "$NAMESPACE" create secret generic auth-database \
            --from-literal=connection-string="Host=auth-postgres.infra.svc.cluster.local;Port=5432;Database=auth_service;Username=auth_service;Password=$AUTH_DB_PASSWORD" \
            --dry-run=client \
            -o yaml | kubectl apply -f -

      - name: Deploy manifests
        run: sed "s|IMAGE_PLACEHOLDER|${IMAGE}|g" k8s/auth-service.yaml | kubectl apply -f -

      - name: Wait for rollout
        run: kubectl -n "$NAMESPACE" rollout status deployment/"$DEPLOYMENT_NAME" --timeout=180s

      - name: Show service
        run: kubectl -n "$NAMESPACE" get deployment,service,endpoints "$DEPLOYMENT_NAME" -o wide
